<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Body Quick Draw! - 몸으로 하는 AI 게임</title>

<!-- Noto Sans KR - 통일된 한글 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>

<!-- MediaPipe Pose -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

<style>
  :root {
    --bg: #0f0c29;
    --bg2: #1a1a3e;
    --accent: #ff6b6b;
    --yellow: #ffd93d;
    --teal: #4ecdc4;
    --green: #6bcb77;
    --purple: #c77dff;
    --card: rgba(255,255,255,0.07);
    --glass: rgba(255,255,255,0.12);
    
    /* 통일된 폰트 */
    --font-primary: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0;
    font-family: var(--font-primary);
  }
  
  body {
    background: linear-gradient(135deg, var(--bg) 0%, #302b63 50%, var(--bg2) 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  /* ── BG STARS ── */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: 0.1; transform: scale(1); } to { opacity: 0.8; transform: scale(1.4); } }

  /* ── LAYOUT ── */
  #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }

  /* ── SCREENS ── */
  .screen { width: 100%; max-width: 900px; animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { opacity:0; transform:scale(0.85) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }

  /* ── INTRO ── */
  #intro { text-align: center; }
  #intro .logo-icon { font-size: 5rem; display: block; margin-bottom: 12px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
  
  #intro h1 { 
    font-size: clamp(2.5rem, 6vw, 4rem); 
    font-weight: 900;
    background: linear-gradient(135deg, var(--yellow), var(--accent), var(--purple)); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    background-clip: text; 
    margin-bottom: 12px;
    letter-spacing: -1px;
  }
  
  #intro .tagline { 
    font-size: 1.15rem; 
    font-weight: 400;
    color: rgba(255,255,255,0.8); 
    max-width: 440px; 
    margin: 0 auto 36px; 
    line-height: 1.6;
  }xx
  
  .gesture-grid { 
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; 
    gap: 10px; 
    margin-bottom: 36px; 
  }
  
  .gesture-chip { 
    background: var(--card); 
    border: 1px solid rgba(255,255,255,0.15); 
    border-radius: 20px; 
    padding: 8px 16px; 
    font-size: 0.9rem; 
    font-weight: 500;
    color: rgba(255,255,255,0.9); 
    backdrop-filter: blur(8px); 
    transition: all 0.2s; 
  }
  
  .gesture-chip:hover { 
    background: var(--glass); 
    transform: scale(1.05);
  }

  /* ── BUTTONS ── */
  .btn { 
    cursor: pointer; 
    border: none; 
    border-radius: 12px; 
    font-size: 1.1rem; 
    font-weight: 700;
    padding: 14px 32px; 
    transition: all 0.15s; 
    box-shadow: 0 4px 0 rgba(0,0,0,0.3); 
    letter-spacing: -0.3px;
  }
  
  .btn:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 6px 0 rgba(0,0,0,0.3); 
  }
  
  .btn:active { 
    transform: translateY(2px); 
    box-shadow: 0 2px 0 rgba(0,0,0,0.3); 
  }
  
  .btn-primary { 
    background: var(--yellow); 
    color: #222; 
    font-size: 1.25rem; 
    padding: 16px 48px;
  }
  
  .btn-teal { 
    background: var(--teal); 
    color: #fff; 
  }
  
  .btn-ghost { 
    background: var(--card); 
    color: #fff; 
    border: 1px solid rgba(255,255,255,0.2); 
    backdrop-filter: blur(8px); 
  }

  /* ── GAME SCREEN ── */
  #game { display: none; flex-direction: column; gap: 14px; }
  #game.active { display: flex; }

  /* ── TOP BAR ── */
  .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  
  .hud-pill { 
    background: var(--card); 
    border: 1px solid rgba(255,255,255,0.12); 
    border-radius: 12px; 
    padding: 8px 16px; 
    backdrop-filter: blur(10px); 
  }
  
  .hud-label { 
    font-size: 0.7rem; 
    font-weight: 500;
    color: rgba(255,255,255,0.5); 
    text-transform: uppercase; 
    letter-spacing: 1px; 
  }
  
  .hud-value { 
    font-size: 1.4rem; 
    font-weight: 700;
    color: var(--yellow);
  }

  /* ── TIMER ── */
  .timer-bar-wrap { flex: 1; }
  
  .timer-bar-bg { 
    background: rgba(255,255,255,0.12); 
    border-radius: 8px; 
    height: 10px; 
    overflow: hidden; 
  }
  
  .timer-bar-fill { 
    height: 100%; 
    border-radius: 8px; 
    transition: width 1s linear, background 0.5s; 
    background: var(--teal); 
    box-shadow: 0 0 10px currentColor;
  }

  /* ── PROGRESS DOTS ── */
  .progress-dots { display: flex; gap: 8px; align-items: center; }
  
  .pdot { 
    width: 14px; 
    height: 14px; 
    border-radius: 50%; 
    background: rgba(255,255,255,0.2); 
    border: 2px solid rgba(255,255,255,0.3); 
    transition: all 0.3s; 
  }
  
  .pdot.done { 
    background: var(--green); 
    border-color: var(--green); 
    box-shadow: 0 0 8px var(--green); 
  }
  
  .pdot.current { 
    background: var(--yellow); 
    border-color: var(--yellow); 
    box-shadow: 0 0 8px var(--yellow); 
    animation: pulseRing 1s infinite; 
  }
  
  @keyframes pulseRing { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

  /* ── MAIN AREA ── */
  .main-area { display: flex; gap: 16px; align-items: flex-start; }
  @media (max-width: 680px) { .main-area { flex-direction: column; } }

  /* ── CAM AREA ── */
  .cam-wrap { 
    position: relative; 
    flex: 1; 
    min-width: 0; 
    border-radius: 16px; 
    overflow: hidden; 
    background: #000; 
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,255,255,0.1); 
    aspect-ratio: 4/3; 
  }
  
  #videoEl { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #poseCanvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); }
  
  .cam-badge { 
    position: absolute; 
    top: 12px; 
    left: 12px; 
    background: rgba(255,50,50,0.85); 
    color: #fff; 
    font-size: 0.75rem; 
    font-weight: 700;
    border-radius: 6px; 
    padding: 4px 10px; 
    display: flex; 
    align-items: center; 
    gap: 6px; 
    backdrop-filter: blur(6px); 
  }
  
  .rec-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

  /* ── SIDE PANEL ── */
  .side-panel { width: 240px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
  @media (max-width: 680px) { .side-panel { width: 100%; flex-direction: row; flex-wrap: wrap; } }

  .panel-card { 
    background: var(--card); 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 16px; 
    padding: 16px; 
    backdrop-filter: blur(10px); 
  }

  /* ── PROMPT CARD ── */
  .prompt-card { text-align: center; }
  
  .prompt-label { 
    font-size: 0.75rem; 
    font-weight: 500;
    color: rgba(255,255,255,0.5); 
    text-transform: uppercase; 
    letter-spacing: 1.5px; 
    margin-bottom: 6px; 
  }
  
  .prompt-word { 
    font-size: 1.8rem; 
    font-weight: 700;
    color: var(--yellow); 
    line-height: 1.3; 
    text-shadow: 0 0 20px rgba(255,217,61,0.4);
  }
  
  .prompt-emoji { font-size: 2.5rem; display: block; margin-bottom: 6px; }

  /* ── AI GUESS CARD ── */
  .ai-card { text-align: center; }
  
  .ai-header { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 6px; 
    margin-bottom: 10px; 
  }
  
  .ai-brain { 
    font-size: 1.2rem; 
    animation: spin 3s linear infinite; 
    display: inline-block; 
  }
  
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  
  .ai-title { 
    font-size: 0.75rem; 
    font-weight: 500;
    color: rgba(255,255,255,0.5); 
    text-transform: uppercase; 
    letter-spacing: 1.5px; 
  }
  
  .ai-bubble { 
    background: rgba(255,255,255,0.1); 
    border-radius: 10px; 
    padding: 10px 14px; 
    min-height: 44px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
  }
  
  .ai-text { 
    font-size: 0.95rem; 
    font-weight: 500;
    color: #fff; 
    line-height: 1.4; 
    text-align: center;
  }

  /* ── TOP PREDS ── */
  .pred-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .pred-row:last-child { margin-bottom: 0; }
  
  .pred-label { 
    font-size: 0.85rem; 
    font-weight: 500;
    color: rgba(255,255,255,0.8); 
    width: 80px; 
    flex-shrink: 0; 
  }
  
  .pred-bar-bg { 
    flex: 1; 
    height: 6px; 
    background: rgba(255,255,255,0.1); 
    border-radius: 4px; 
    overflow: hidden; 
  }
  
  .pred-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  
  .pred-pct { 
    font-size: 0.75rem; 
    font-weight: 500;
    color: rgba(255,255,255,0.6); 
    width: 34px; 
    text-align: right; 
    flex-shrink: 0; 
  }

  /* ── RESULT ── */
  #result { display: none; text-align: center; }
  #result.active { display: block; }
  
  .result-title { 
    font-size: clamp(1.8rem, 5vw, 3rem); 
    font-weight: 700;
    margin-bottom: 8px; 
  }
  
  .score-display { 
    font-size: 5rem; 
    font-weight: 900;
    color: var(--yellow); 
    text-shadow: 0 0 30px rgba(255,217,61,0.5); 
    line-height: 1; 
    margin: 16px 0 8px;
  }
  
  .score-sub { 
    color: rgba(255,255,255,0.6); 
    font-size: 1rem; 
    font-weight: 400;
    margin-bottom: 28px; 
  }
  
  .gestures-done { 
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; 
    gap: 10px; 
    margin-bottom: 32px; 
  }
  
  .g-chip { 
    border-radius: 16px; 
    padding: 8px 16px; 
    font-size: 0.9rem; 
    font-weight: 500;
  }
  
  .g-chip.hit { 
    background: rgba(107,203,119,0.2); 
    border: 1px solid var(--green); 
    color: var(--green); 
  }
  
  .g-chip.miss { 
    background: rgba(255,107,107,0.15); 
    border: 1px solid rgba(255,107,107,0.4); 
    color: rgba(255,255,255,0.5); 
    text-decoration: line-through; 
  }

  /* ── LOADING / PERMISSION ── */
  #loading { text-align: center; }
  
  .spinner { 
    width: 48px; 
    height: 48px; 
    border: 4px solid rgba(255,255,255,0.15); 
    border-top-color: var(--teal); 
    border-radius: 50%; 
    animation: spin 0.8s linear infinite; 
    margin: 0 auto 16px; 
  }

  /* ── PARTICLES ── */
  .particle { 
    position: fixed; 
    pointer-events: none; 
    border-radius: 50%; 
    z-index: 999; 
    animation: fly 1.2s ease-out forwards;
  }
  
  @keyframes fly { 0% { opacity:1; transform: translate(0,0) scale(1); } 100% { opacity:0; transform: translate(var(--tx), var(--ty)) scale(0.2); } }

  /* ── CORRECT FLASH ── */
  .correct-flash { 
    position: fixed; 
    inset: 0; 
    background: rgba(107,203,119,0.25); 
    z-index: 998; 
    pointer-events: none; 
    animation: flashOut 0.5s ease-out forwards;
  }
  
  @keyframes flashOut { from { opacity:1; } to { opacity:0; } }

  /* ── COUNTDOWN ── */
  #countdown-overlay { 
    position: fixed; 
    inset: 0; 
    z-index: 100; 
    background: rgba(15,12,41,0.85); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    backdrop-filter: blur(6px);
  }
  
  .countdown-num { 
    font-size: 8rem; 
    font-weight: 900;
    color: var(--yellow); 
    text-shadow: 0 0 60px rgba(255,217,61,0.6); 
    animation: countPop 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }
  
  @keyframes countPop { from { opacity:0; transform: scale(2); } to { opacity:1; transform: scale(1); } }

  /* ── PERMISSION ── */
  #permission { text-align: center; }
  
  #permission .perm-icon { 
    font-size: 4rem; 
    display: block; 
    margin-bottom: 16px; 
  }
  
  #permission h2 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 12px;
  }
  
  #permission p {
    font-size: 1rem;
    line-height: 1.6;
    font-weight: 400;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="stars" id="starsEl"></div>

<div id="app">

  <!-- INTRO -->
  <div id="intro" class="screen">
    <span class="logo-icon">🕺</span>
    <h1>Body Quick Draw!</h1>
    <p class="tagline">몸으로 제스처를 취해보세요.<br>AI가 실시간으로 무엇인지 맞춰봅니다!</p>
    <div class="gesture-grid">
      <span class="gesture-chip">✈️ 비행기</span>
      <span class="gesture-chip">🌳 나무</span>
      <span class="gesture-chip">⭐ 별</span>
      <span class="gesture-chip">🙌 손 들기</span>
      <span class="gesture-chip">💪 근육</span>
      <span class="gesture-chip">🫡 경례</span>
      <span class="gesture-chip">👋 인사</span>
      <span class="gesture-chip">🦸 히어로</span>
      <span class="gesture-chip">🤖 로봇</span>
      <span class="gesture-chip">🎸 기타</span>
    </div>
    <button class="btn btn-primary" onclick="startPermission()">게임 시작 🎮</button>
  </div>

  <!-- PERMISSION -->
  <div id="permission" class="screen hidden">
    <span class="perm-icon">📷</span>
    <h2>카메라 접근 필요</h2>
    <p style="color:rgba(255,255,255,0.65);margin-bottom:28px;max-width:360px;margin-left:auto;margin-right:auto;">
      웹캠이 필요합니다.<br>모든 데이터는 브라우저에서만 처리됩니다.
    </p>
    <button class="btn btn-primary" onclick="requestCamera()">카메라 허용 📸</button>
  </div>

  <!-- LOADING -->
  <div id="loading" class="screen hidden">
    <div class="spinner"></div>
    <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:8px;" id="loadingText">로딩 중...</h2>
    <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;" id="loadingSub">포즈 감지 준비 중</p>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="hud-pill">
        <div class="hud-label">점수</div>
        <div class="hud-value" id="scoreVal">0</div>
      </div>
      <div class="timer-bar-wrap">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <span style="font-size:0.75rem;color:rgba(255,255,255,0.5);font-weight:500;">시간</span>
          <span style="font-size:0.9rem;font-weight:700;" id="timerLabel">60초</span>
        </div>
        <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerBar" style="width:100%"></div></div>
      </div>
      <div class="progress-dots" id="progressDots"></div>
    </div>

    <!-- MAIN AREA -->
    <div class="main-area">
      <!-- WEBCAM -->
      <div class="cam-wrap">
        <video id="videoEl" autoplay muted playsinline></video>
        <canvas id="poseCanvas"></canvas>
        <div class="cam-badge"><div class="rec-dot"></div> LIVE</div>
      </div>

      <!-- SIDE PANEL -->
      <div class="side-panel">
        <!-- PROMPT -->
        <div class="panel-card prompt-card">
          <div class="prompt-label">따라해보세요</div>
          <span class="prompt-emoji" id="promptEmoji">✈️</span>
          <div class="prompt-word" id="promptWord">비행기</div>
        </div>

        <!-- AI GUESS -->
        <div class="panel-card ai-card">
          <div class="ai-header">
            <span class="ai-brain">🧠</span>
            <span class="ai-title">AI 추측</span>
          </div>
          <div class="ai-bubble">
            <div class="ai-text" id="aiGuessText">카메라 앞에 서세요...</div>
          </div>
        </div>

        <!-- TOP PREDICTIONS -->
        <div class="panel-card">
          <div style="font-size:0.7rem;color:rgba(255,255,255,0.4);font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">상위 추측</div>
          <div id="predBars"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen hidden">
    <div class="result-emoji" id="resultEmoji" style="font-size:5rem;margin-bottom:8px;"></div>
    <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    <div class="score-display" id="finalScore">0</div>
    <div class="score-sub" id="finalSub">/ 6개 제스처</div>
    <div class="gestures-done" id="gesturesDone"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="restartGame()">다시 하기 🔄</button>
      <button class="btn btn-ghost" onclick="goIntro()">홈 🏠</button>
    </div>
  </div>

</div>

<!-- COUNTDOWN OVERLAY -->
<div id="countdown-overlay" class="hidden">
  <div class="countdown-num" id="countdownNum">3</div>
</div>

<script>
// ═══════════════════════════════════════════════
// STARS BACKGROUND
// ═══════════════════════════════════════════════
(function() {
  const el = document.getElementById('starsEl');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 3 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    el.appendChild(s);
  }
})();

// ═══════════════════════════════════════════════
// GESTURE DEFINITIONS
// ═══════════════════════════════════════════════
const GESTURES = [
  { id: 'airplane',   label: '비행기',    emoji: '✈️',  desc: '양팔을 벌려 날개처럼' },
  { id: 'tree',       label: '나무',      emoji: '🌳',  desc: '똑바로 서서 팔을 위로 뻗어 나무처럼' },
  { id: 'star',       label: '별',        emoji: '⭐',  desc: '팔과 다리를 벌려 별 모양' },
  { id: 'hands_up',   label: '손 들기',   emoji: '🙌',  desc: '양손을 머리 위로 들기' },
  { id: 'muscle',     label: '근육',      emoji: '💪',  desc: '보디빌더처럼 근육 자랑하기' },
  { id: 'salute',     label: '경례',      emoji: '🫡',  desc: '이마에 손을 대고 경례' },
  { id: 'wave',       label: '인사',      emoji: '👋',  desc: '한 손을 흔들어 인사' },
  { id: 'superhero',  label: '히어로',    emoji: '🦸',  desc: '한 손은 주먹으로 위로, 다른 손은 허리에' },
  { id: 'robot',      label: '로봇',      emoji: '🤖',  desc: '딱딱한 팔로 로봇처럼' },
  { id: 'guitar',     label: '기타',      emoji: '🎸',  desc: '에어 기타 치는 자세' },
  { id: 'squat',      label: '스쿼트',    emoji: '🏋️',  desc: '팔을 앞으로 뻗고 스쿼트' },
  { id: 'kick',       label: '킥',        emoji: '🦵',  desc: '한 다리를 들어 차는 자세' },
];

// Pose connections for skeleton drawing
const POSE_CONNECTIONS = [
  [11,12],[11,13],[13,15],[12,14],[14,16],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[27,29],[27,31],
  [24,26],[26,28],[28,30],[28,32],
  [0,1],[1,3],[0,2],[2,4],
  [5,6],[5,7],[7,9],[6,8],[8,10],
];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let gameState = {
  phase: 'intro',
  selectedGestures: [],
  currentIdx: 0,
  score: 0,
  timeLeft: 60,
  timerInterval: null,
  poseSequence: [],
  predictionHistory: [],
  completedGestures: [],
  collectedData: [],
  lastConfirmedGesture: null,
  confirmFrames: 0,
  CONFIRM_THRESHOLD: 18,
  model: null,
};

let poseDetector = null;
let mediaCamera = null;
let videoStream = null;
let tfModel = null;
let gestureLabels = [];

async function loadModel() {
  try {
    const res = await fetch('labels.json');
    gestureLabels = await res.json();
    console.log('라벨 로드 완료:', gestureLabels);

    tfModel = await tf.loadLayersModel('web_model/model.json');
    console.log('모델 로드 완료!');
  } catch(e) {
    console.error('모델 로드 실패:', e);
  }
}

// ═══════════════════════════════════════════════
// RULE-BASED GESTURE CLASSIFIER
// ═══════════════════════════════════════════════
async function classifyGesture(sequence) {
  // 모델 없으면 null
  if (!tfModel || !sequence || sequence.length < 30) return null;

  // 입력 데이터 준비
  // sequence: [30프레임][33관절][3좌표]
  const input = sequence.map(frame =>
    frame.reduce((acc, lm) => acc.concat(lm), [])
  );

  // TensorFlow.js 로 추론
  const tensor = tf.tensor3d([input], [1, 30, 99]);
  const result = tfModel.predict(tensor);
  const probs  = await result.data();
  tensor.dispose();
  result.dispose();

  // 결과를 { 제스처이름: 확률 } 형태로 변환
  const output = {};
  gestureLabels.forEach((label, i) => {
    output[label] = probs[i];
  });

  return output;
}

// ═══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════
function showScreen(id) {
  ['intro','permission','loading','game','result'].forEach(s => {
    const el = document.getElementById(s);
    if (s === 'game') {
      el.classList.toggle('active', s === id);
      el.style.display = s === id ? 'flex' : 'none';
    } else {
      el.classList.toggle('hidden', s !== id);
    }
  });
}

// ═══════════════════════════════════════════════
// CAMERA & MEDIAPIPE SETUP
// ═══════════════════════════════════════════════
async function startPermission() {
  showScreen('permission');
}

async function requestCamera() {
  showScreen('loading');
  setLoadingText('카메라 요청 중...', '카메라 접근을 허용해주세요');

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({ video: { width:640, height:480, facingMode:'user' }, audio: false });
    const video = document.getElementById('videoEl');
    video.srcObject = videoStream;
    await new Promise(r => video.onloadedmetadata = r);

    setLoadingText('MediaPipe Pose 로딩 중...', '잠시만 기다려주세요');
    await initMediaPipe();

  } catch (err) {
    showScreen('permission');
    alert('카메라 접근이 거부되었습니다. 게임을 하려면 카메라를 허용해주세요.');
  }
}

function setLoadingText(title, sub) {
  document.getElementById('loadingText').textContent = title;
  document.getElementById('loadingSub').textContent = sub;
}

async function initMediaPipe() {
  return new Promise((resolve, reject) => {
    try {
      poseDetector = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
      });

      poseDetector.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      poseDetector.onResults(onPoseResults);

      setLoadingText('카메라 피드 시작 중...', '거의 완료되었습니다!');

      const video = document.getElementById('videoEl');

      mediaCamera = new Camera(video, {
        onFrame: async () => {
          if (poseDetector) {
            await poseDetector.send({ image: video });
          }
        },
        width: 640, height: 480
      });

      mediaCamera.start().then(() => {
        setLoadingText('준비 완료!', '게임을 시작합니다...');
        setTimeout(() => {
          beginGame();
          resolve();
        }, 800);
      }).catch(reject);

    } catch (e) {
      reject(e);
    }
  });
}

// ═══════════════════════════════════════════════
// POSE RESULTS HANDLER
// ═══════════════════════════════════════════════
function onPoseResults(results) {
  const canvas = document.getElementById('poseCanvas');
  const video = document.getElementById('videoEl');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  const landmarks = results.poseLandmarks.map(lm => [lm.x, lm.y, lm.z]);

  gameState.poseSequence.push(landmarks);
  if (gameState.poseSequence.length > 30) gameState.poseSequence.shift();

  drawSkeleton(ctx, results.poseLandmarks, canvas.width, canvas.height);

  if (gameState.phase === 'playing') {
    runClassification();
  }
}

function drawSkeleton(ctx, landmarks, w, h) {
  if (!landmarks) return;

  ctx.lineWidth = 3;
  POSE_CONNECTIONS.forEach(([a, b]) => {
    const la = landmarks[a], lb = landmarks[b];
    if (!la || !lb || la.visibility < 0.3 || lb.visibility < 0.3) return;
    const gradient = ctx.createLinearGradient(la.x*w, la.y*h, lb.x*w, lb.y*h);
    gradient.addColorStop(0, 'rgba(78,205,196,0.85)');
    gradient.addColorStop(1, 'rgba(199,125,255,0.85)');
    ctx.strokeStyle = gradient;
    ctx.beginPath();
    ctx.moveTo(la.x*w, la.y*h);
    ctx.lineTo(lb.x*w, lb.y*h);
    ctx.stroke();
  });

  landmarks.forEach((lm, i) => {
    if (lm.visibility < 0.35) return;
    ctx.beginPath();
    ctx.arc(lm.x*w, lm.y*h, i === 0 ? 7 : 5, 0, Math.PI*2);
    ctx.fillStyle = i === 0 ? '#ffd93d' : 'rgba(255,255,255,0.9)';
    ctx.shadowBlur = 8;
    ctx.shadowColor = i === 0 ? '#ffd93d' : '#4ecdc4';
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

// ═══════════════════════════════════════════════
// CLASSIFICATION & GAME LOGIC
// ═══════════════════════════════════════════════
async function runClassification() {
  if (gameState.poseSequence.length < 5) return;

  const probs = classifyGesture(gameState.poseSequence);
  if (!probs) return;

  const sorted = Object.entries(probs).sort((a,b) => b[1]-a[1]);
  const topGesture = sorted[0][0];
  const topConf = sorted[0][1];

  gameState.predictionHistory.push({ gesture: topGesture, conf: topConf, ts: Date.now() });
  if (gameState.predictionHistory.length > 90) gameState.predictionHistory.shift();

  updatePredUI(sorted.slice(0,4), probs);
  updateAIGuess(topGesture, topConf, sorted);

  const currentGesture = gameState.selectedGestures[gameState.currentIdx];
  if (topGesture === currentGesture.id && topConf > 0.45) {
    gameState.confirmFrames++;
    if (gameState.confirmFrames >= gameState.CONFIRM_THRESHOLD) {
      confirmGesture();
    }
  } else {
    gameState.confirmFrames = Math.max(0, gameState.confirmFrames - 2);
  }
}

const AI_PHRASES = [
  (g) => `혹시... ${g}?`,
  (g) => `아마도 ${g}?`,
  (g) => `${g}인 것 같아요!`,
  (g) => `흠, ${g}?`,
  (g) => `${g}처럼 보여요!`,
];
let lastPhraseIdx = -1;
let lastGuessedGesture = '';

function updateAIGuess(gesture, conf, sorted) {
  const el = document.getElementById('aiGuessText');
  const gestureObj = GESTURES.find(g => g.id === gesture);
  const label = gestureObj ? gestureObj.label : gesture;

  if (conf < 0.25) {
    el.textContent = "잘 모르겠어요...";
    return;
  }
  if (conf < 0.4) {
    el.textContent = `뭔가 보이는데... 혹시 ${label}?`;
    return;
  }

  if (gesture !== lastGuessedGesture) {
    lastGuessedGesture = gesture;
    let idx = Math.floor(Math.random() * AI_PHRASES.length);
    while (idx === lastPhraseIdx) idx = Math.floor(Math.random() * AI_PHRASES.length);
    lastPhraseIdx = idx;
    el.textContent = AI_PHRASES[idx](label);
  }
}

function updatePredUI(sorted, allProbs) {
  const container = document.getElementById('predBars');
  const colors = ['#ffd93d','#4ecdc4','#c77dff','#ff6b6b'];

  container.innerHTML = sorted.map(([id, conf], i) => {
    const g = GESTURES.find(x => x.id === id);
    const label = g ? g.label : id;
    const pct = Math.round(conf * 100);
    return `
      <div class="pred-row">
        <div class="pred-label">${g?.emoji||''} ${label}</div>
        <div class="pred-bar-bg"><div class="pred-bar-fill" style="width:${pct}%;background:${colors[i]}"></div></div>
        <div class="pred-pct">${pct}%</div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════════
function selectGestures() {
  const shuffled = [...GESTURES].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 6);
}

function beginGame() {
  loadModel();
  gameState.selectedGestures = selectGestures();
  gameState.currentIdx = 0;
  gameState.score = 0;
  gameState.timeLeft = 60;
  gameState.completedGestures = [];
  gameState.predictionHistory = [];
  gameState.poseSequence = [];
  gameState.collectedData = [];
  gameState.confirmFrames = 0;

  buildProgressDots();
  showScreen('game');
  updateScoreUI();

  showCountdown(() => {
    gameState.phase = 'playing';
    setCurrentGesture();
    startTimer();
  });
}

function showCountdown(cb) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdownNum');
  overlay.classList.remove('hidden');
  let n = 3;
  numEl.textContent = n;

  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      numEl.textContent = '시작!';
      setTimeout(() => {
        overlay.classList.add('hidden');
        cb();
      }, 700);
    } else {
      numEl.textContent = n;
      numEl.style.animation = 'none';
      numEl.offsetHeight;
      numEl.style.animation = '';
    }
  }, 900);
}

function setCurrentGesture() {
  if (gameState.currentIdx >= gameState.selectedGestures.length) return;
  const g = gameState.selectedGestures[gameState.currentIdx];
  document.getElementById('promptEmoji').textContent = g.emoji;
  document.getElementById('promptWord').textContent = g.label;
  document.getElementById('aiGuessText').textContent = g.desc;
  gameState.confirmFrames = 0;
  lastGuessedGesture = '';
  updateProgressDots();
}

function startTimer() {
  clearInterval(gameState.timerInterval);
  gameState.timerInterval = setInterval(() => {
    gameState.timeLeft--;
    updateTimerUI();
    if (gameState.timeLeft <= 0) {
      clearInterval(gameState.timerInterval);
      endGame();
    }
  }, 1000);
}

function updateTimerUI() {
  const pct = (gameState.timeLeft / 60) * 100;
  const bar = document.getElementById('timerBar');
  bar.style.width = pct + '%';
  const color = gameState.timeLeft > 20 ? '#4ecdc4' : gameState.timeLeft > 10 ? '#ffd93d' : '#ff6b6b';
  bar.style.background = color;
  document.getElementById('timerLabel').textContent = gameState.timeLeft + '초';
}

function updateScoreUI() {
  document.getElementById('scoreVal').textContent = gameState.score;
}

function buildProgressDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = gameState.selectedGestures.map((g, i) =>
    `<div class="pdot" id="pdot-${i}" title="${g.label}"></div>`
  ).join('');
}

function updateProgressDots() {
  gameState.selectedGestures.forEach((g, i) => {
    const dot = document.getElementById('pdot-' + i);
    if (!dot) return;
    if (i < gameState.currentIdx) dot.className = 'pdot done';
    else if (i === gameState.currentIdx) dot.className = 'pdot current';
    else dot.className = 'pdot';
  });
}

function confirmGesture() {
  if (gameState.phase !== 'playing') return;
  gameState.phase = 'confirming';

  const gesture = gameState.selectedGestures[gameState.currentIdx];
  gameState.score++;
  gameState.completedGestures.push({ gesture, hit: true });

  spawnSuccessEffects();
  updateScoreUI();

  setTimeout(() => {
    gameState.currentIdx++;
    if (gameState.currentIdx >= gameState.selectedGestures.length) {
      clearInterval(gameState.timerInterval);
      endGame();
    } else {
      gameState.phase = 'playing';
      setCurrentGesture();
    }
  }, 900);
}

function endGame() {
  gameState.phase = 'gameover';
  clearInterval(gameState.timerInterval);

  for (let i = gameState.currentIdx; i < gameState.selectedGestures.length; i++) {
    gameState.completedGestures.push({ gesture: gameState.selectedGestures[i], hit: false });
  }

  showResultScreen();
}

function showResultScreen() {
  const score = gameState.score;
  const total = gameState.selectedGestures.length;

  document.getElementById('resultEmoji').textContent = score >= 5 ? '🏆' : score >= 3 ? '🎯' : '💪';
  document.getElementById('resultTitle').textContent = score >= 5 ? '대단해요!' : score >= 3 ? '잘했어요!' : '계속 연습하세요!';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalSub').textContent = `/ ${total}개 제스처`;

  const done = document.getElementById('gesturesDone');
  done.innerHTML = gameState.completedGestures.map(({ gesture, hit }) =>
    `<div class="g-chip ${hit ? 'hit' : 'miss'}">${gesture.emoji} ${gesture.label}</div>`
  ).join('');

  showScreen('result');
}

// ═══════════════════════════════════════════════
// EFFECTS
// ═══════════════════════════════════════════════
function spawnSuccessEffects() {
  const flash = document.createElement('div');
  flash.className = 'correct-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 600);

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const colors = ['#ffd93d','#4ecdc4','#ff6b6b','#6bcb77','#c77dff'];
    const sz = 8 + Math.random() * 12;
    const angle = Math.random() * 360;
    const dist = 80 + Math.random() * 120;
    p.style.cssText = `
      width:${sz}px;height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${30+Math.random()*40}%;top:${30+Math.random()*40}%;
      --tx:${Math.cos(angle*Math.PI/180)*dist}px;
      --ty:${Math.sin(angle*Math.PI/180)*dist}px;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1400);
  }
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function restartGame() {
  beginGame();
}

function goIntro() {
  gameState.phase = 'intro';
  clearInterval(gameState.timerInterval);
  showScreen('intro');
}
